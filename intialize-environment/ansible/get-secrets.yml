# ============================================================
# Ansible: Get secrets from Azure Key Vault
# ============================================================

---
- name: "Get MySQL secrets from Azure Key Vault"
  hosts: localhost
  gather_facts: no
  vars:
    key_vault_name: "cis-mysql-kv"
    key_vault_resource_group: "cis-mysql-rg"
    secret_names:
      - mysql-root-password
      - mysql-backup-password

  tasks:
    # Get access token
    - name: "Get Azure access token"
      azure.azcollection.azure_rm_authentication:
        subscription_id: "{{ lookup('env', 'AZURE_SUBSCRIPTION_ID') }}"
        client_id: "{{ lookup('env', 'AZURE_CLIENT_ID') }}"
        secret: "{{ lookup('env', 'AZURE_CLIENT_SECRET') }}"
        tenant: "{{ lookup('env', 'AZURE_TENANT') }}"
      register: azure_auth

    # Get Key Vault secrets
    - name: "Get secrets from Key Vault"
      azure.azcollection.azure_rm_keyvaultsecret_info:
        vault_uri: "https://{{ key_vault_name }}.vault.azure.net"
        name: "{{ item }}"
      loop: "{{ secret_names }}"
      register: secrets_results

    - name: "Set secrets as facts"
      set_fact:
        mysql_root_password: "{{ secrets_results.results[0].secret.properties.secret_value }}"
        mysql_backup_password: "{{ secrets_results.results[1].secret.properties.secret_value }}"

    - name: "Display secrets (masked)"
      debug:
        msg: |
          MySQL Root Password: {{ mysql_root_password | regex_replace('.', '*') }}
          Backup Password: {{ mysql_backup_password | regex_replace('.', '*') }}