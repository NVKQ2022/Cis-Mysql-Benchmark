# ============================================================
# Ansible Inventory - Using Azure Key Vault
# ============================================================

[mysql_servers]
azure-vm ansible_host=YOUR_VM_IP ansible_user=azureuser ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[mysql_servers:vars]
ansible_python_interpreter=/usr/bin/python3
key_vault_name=cis-mysql-kv

# To use Key Vault, set these environment variables:
# export AZURE_SUBSCRIPTION_ID="your-subscription-id"
# export AZURE_CLIENT_ID="your-client-id"
# export AZURE_CLIENT_SECRET="your-client-secret"
# export AZURE_TENANT="your-tenant-id"