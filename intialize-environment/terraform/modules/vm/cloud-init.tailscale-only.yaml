#cloud-config
# ============================================================
# Cloud-init: Minimal — only Tailscale (VM from hardened image)
# ============================================================

package_update: false
packages: []

runcmd:
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --auth-key=${TAILSCALE_AUTH_KEY} --operator=azureuser

final_message: "Tailscale setup complete"
