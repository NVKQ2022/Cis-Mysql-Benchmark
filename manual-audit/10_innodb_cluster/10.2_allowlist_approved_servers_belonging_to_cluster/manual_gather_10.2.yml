# ==============================================================================
# CIS 10.2 - Allowlist Approved Servers Belonging to a
#            MySQL InnoDB Cluster (Manual)
# ==============================================================================
#
# Mục tiêu:
# Đảm bảo MySQL Group Replication/InnoDB Cluster chỉ cho phép
# các server đã được allowlist tham gia cluster.
#
# CIS yêu cầu:
# Cấu hình group_replication_ip_allowlist
#
# Ví dụ hợp lệ:
# - 203.0.113.0/24
# - 192.168.1.10
# - db-node-01.example.local
#
# Rủi ro:
# Nếu không có allowlist:
# - Server lạ có thể attempt join cluster
# - Tăng attack surface
# - Tăng nguy cơ unauthorized replication member
# ==============================================================================

# ------------------------------------------------------------------------------
# STEP 1 - Kiểm tra Group Replication plugin
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Check Group Replication plugin
  ansible.builtin.shell: |
    mysql -N -B -e "
    SELECT PLUGIN_STATUS
    FROM INFORMATION_SCHEMA.PLUGINS
    WHERE PLUGIN_NAME='group_replication';
    "
  register: group_replication_plugin
  become: yes
  changed_when: false

# ------------------------------------------------------------------------------
# STEP 2 - Debug plugin status
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Debug plugin status
  ansible.builtin.debug:
    msg:
      - "Group Replication Plugin Status: '{{ group_replication_plugin.stdout }}'"

# ------------------------------------------------------------------------------
# STEP 3 - Lấy giá trị group_replication_ip_allowlist
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Get group_replication_ip_allowlist
  ansible.builtin.shell: |
    mysql -N -B -e "
    SELECT @@group_replication_ip_allowlist;
    "
  register: replication_ip_allowlist
  become: yes
  changed_when: false
  when: group_replication_plugin.stdout == "ACTIVE"

# ------------------------------------------------------------------------------
# STEP 4 - Debug allowlist value
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Debug allowlist
  ansible.builtin.debug:
    msg:
      - "group_replication_ip_allowlist = '{{ replication_ip_allowlist.stdout }}'"
  when: group_replication_plugin.stdout == "ACTIVE"

# ------------------------------------------------------------------------------
# STEP 5 - Xử lý logic đánh giá
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Determine compliance status
  ansible.builtin.set_fact:
    cis_10_2_status: >-

      {% if group_replication_plugin.stdout == '' %}
      NOT APPLICABLE
      (Group Replication plugin không được cài đặt)

      {% elif group_replication_plugin.stdout != 'ACTIVE' %}
      FAIL
      (Group Replication plugin không hoạt động)

      {% elif replication_ip_allowlist.stdout == ''
              or replication_ip_allowlist.stdout == 'AUTOMATIC' %}
      MANUAL REVIEW REQUIRED
      (Không có explicit allowlist hoặc đang dùng AUTOMATIC)

      {% else %}
      PASS
      (Allowlist đã được cấu hình:
      {{ replication_ip_allowlist.stdout }})

      {% endif %}

# ------------------------------------------------------------------------------
# STEP 6 - In kết quả cuối
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Print final result
  ansible.builtin.debug:
    msg:
      - "======================================================"
      - " CIS 10.2 - Allowlist Approved Servers"
      - "            Belonging to a MySQL InnoDB Cluster"
      - "======================================================"
      - "Group Replication Plugin : {{ group_replication_plugin.stdout | default('NOT INSTALLED') }}"
      - "IP Allowlist             : {{ replication_ip_allowlist.stdout | default('N/A') }}"
      - "------------------------------------------------------"
      - "FINAL STATUS             : {{ cis_10_2_status }}"
      - "------------------------------------------------------"
      - "EXPECTED VALUES:"
      - "- IPv4 addresses"
      - "- IPv6 addresses"
      - "- CIDR subnet ranges"
      - "- Approved hostnames"
      - "------------------------------------------------------"
      - "EXAMPLES:"
      - "- 203.0.113.0/24"
      - "- 192.168.1.10"
      - "- db-node-01.example.local"
      - "------------------------------------------------------"
      - "NOTE:"
      - "This CIS control is MANUAL because automation"
      - "cannot fully verify:"
      - "- Business-approved cluster members"
      - "- Network ownership"
      - "- DNS trustworthiness"
      - "- Cluster topology security"
      - "- Infrastructure authorization"
      - "======================================================"

# ------------------------------------------------------------------------------
# STEP 7 - Gợi ý remediation
# ------------------------------------------------------------------------------

- name: CIS 10.2 - Remediation suggestion
  ansible.builtin.debug:
    msg:
      - "REMEDIATION:"
      - "Configure explicit allowlist for Group Replication."
      - ""
      - "Example:"
      - "group_replication_ip_allowlist="
      - "\"203.0.113.0/24,192.168.1.10\""
      - ""
      - "Avoid using:"
      - "- AUTOMATIC"
      - "- 0.0.0.0/0"
      - "- overly broad subnets"
  when:
    - group_replication_plugin.stdout == "ACTIVE"
    - replication_ip_allowlist.stdout == ''
      or replication_ip_allowlist.stdout == 'AUTOMATIC'