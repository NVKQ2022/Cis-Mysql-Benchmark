# ==============================================================================
# TỰ ĐỘNG ĐÁNH GIÁ Mục 1.7: Ensure MySQL is Run Under a Sandbox Environment
# ==============================================================================

- name: CIS 1.7 - Kiểm tra cấu hình chroot (Tìm dòng bắt đầu bằng chroot)
  ansible.builtin.shell: grep -i '^chroot' /etc/mysql/my.cnf /etc/mysql/mysql.conf.d/*.cnf || true
  register: chroot_check
  become: yes
  changed_when: false

- name: CIS 1.7 - Kiểm tra trạng thái service systemd của MySQL (Lấy dòng Main PID)
  ansible.builtin.shell: systemctl status mysql | grep 'Main PID' || true
  register: systemd_check
  become: yes
  changed_when: false

- name: CIS 1.7 - Kiểm tra xem có đang chạy trong Docker không
  ansible.builtin.shell: docker ps | grep mysql || true
  register: docker_check
  become: yes
  changed_when: false

- name: CIS 1.7 - IN KẾT QUẢ TỪNG MỤC CHECK (DEBUG DỮ LIỆU)
  ansible.builtin.debug:
    msg:
      - "[1] Kết quả Chroot  : '{{ chroot_check.stdout }}'"
      - "[2] Kết quả Systemd : '{{ systemd_check.stdout }}'"
      - "[3] Kết quả Docker  : '{{ docker_check.stdout }}'"

# ------------------------------------------------------------------------------
# Xử lý logic: Systemd PASS nếu biến không rỗng VÀ KHÔNG chứa chữ (root)
# ------------------------------------------------------------------------------
- name: CIS 1.7 - Xử lý logic Đánh giá (Pass/Fail)
  ansible.builtin.set_fact:
    cis_1_7_status: >-
      {% if chroot_check.stdout != '' %}
      PASS (Bảo vệ bằng chroot)
      {% elif systemd_check.stdout != '' and '(root)' not in systemd_check.stdout %}
      PASS (Bảo vệ bằng systemd isolation - Tiến trình hợp lệ: {{ systemd_check.stdout | trim }})
      {% elif docker_check.stdout != '' %}
      PASS (Bảo vệ bằng Docker container)
      {% else %}
      FAIL (Không tìm thấy cơ chế Sandbox nào hợp lệ)
      {% endif %}

- name: CIS 1.7 - In Kết Luận Cuối Cùng
  ansible.builtin.debug:
    msg:
      - "--- KẾT QUẢ ĐÁNH GIÁ MỤC 1.7 ---"
      - ">> TRẠNG THÁI CIS 1.7 : {{ cis_1_7_status }}"