---
# Role: mysql_backup_verify_cis_2_1_2
# Purpose: CIS 2.1.2 - Verify Backups are Good (Manual)

- name: "CIS 2.1.2 | Verify MySQL backups are valid and restorable"
  hosts: all
  become: yes

  vars:
    backup_dir: /backup/mysql
    mysql_password: "CHANGE_ME"

  tasks:

    # 1. Check backup directory exists
    - name: "Verify backup directory exists"
      file:
        path: "{{ backup_dir }}"
        state: directory
      register: backup_dir_check

    # 2. List recent backup files
    - name: "Find recent backup files"
      shell: "find {{ backup_dir }} -type f \( -name '*.sql' -o -name '*.gz' -o -name '*.xbstream' \) -mtime -7 2>/dev/null | head -10"
      register: recent_backups
      changed_when: false
      failed_when: false

    # 3. Check backup file count
    - name: "Count backup files"
      shell: "find {{ backup_dir }} -type f \( -name '*.sql' -o -name '*.gz' \) 2>/dev/null | wc -l"
      register: backup_count
      changed_when: false
      failed_when: false

    # 4. Test backup file integrity (gzip)
    - name: "Test gzip backup integrity"
      shell: "for f in {{ backup_dir }}/*.gz; do [ -f \"$f\" ] && gzip -t \"$f\" 2>/dev/null || echo \"CORRUPT:$f\"; done"
      register: gzip_test
      changed_when: false
      failed_when: false

    # 5. Generate audit report
    - name: "Generate backup verification report"
      copy:
        dest: /root/cis-audit-reports/2.1.2_backup_verification.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.1.2
          ==========================================
          Control: Verify Backups are Good
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          BACKUP STATUS:
          - Backup Directory: {{ backup_dir }} - {{ 'EXISTS' if backup_dir_check.changed == false else 'CREATED' }}
          - Backup Count: {{ backup_count.stdout }} file(s)
          - Recent Backups (7 days):
          {{ recent_backups.stdout | default('None') }}

          INTEGRITY CHECK:
          {{ gzip_test.stdout | default('No gzip files found') }}

          STATUS: {% if backup_count.stdout | int > 0 %}PASS{% else %}FAIL{% endif %}

          CIS BENCHMARK:
          "Backups should be verified to ensure they can be restored.
          Test restoration periodically."
          ==========================================
