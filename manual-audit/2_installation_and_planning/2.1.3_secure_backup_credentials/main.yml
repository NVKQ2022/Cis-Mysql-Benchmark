---
# Role: mysql_backup_secure_cis_2_1_3
# Purpose: CIS 2.1.3 - Secure Backup Credentials (Manual)

- name: "CIS 2.1.3 | Secure backup credentials"
  hosts: all
  become: yes

  vars:
    backup_user: backup_user
    backup_password: "CHANGE_ME_STRONG_PASSWORD"

  tasks:

    # 1. Check for plaintext passwords in MySQL config
    - name: "Check for plaintext passwords in MySQL config"
      shell: "grep -r 'password' /etc/mysql/*.cnf 2>/dev/null | grep -v '^#' | grep -v 'MYSQL_ROOT_PASSWORD' || echo 'NONE_FOUND'"
      register: plaintext_check
      changed_when: false
      failed_when: false

    # 2. Create backup user with minimal privileges
    - name: "Create dedicated backup user"
      mysql_user:
        name: "{{ backup_user }}"
        host: localhost
        password: "{{ backup_password }}"
        priv: 'mysql.*:SELECT,LOCK TABLES,RELOAD,PROCESS,SHOW VIEW'
        state: present
      ignore_errors: yes

    # 3. Create .mylogin.cnf for secure credential storage
    - name: "Create mysql_config_editor login path"
      shell: |
        mysql_config_editor set \
          --login-path=backup \
          --host=localhost \
          --user={{ backup_user }} \
          --password \
          --socket=/var/lib/mysql/mysql.sock
      become_user: root
      ignore_errors: yes
      register: login_path_created

    # 4. Generate audit report
    - name: "Generate credential security report"
      copy:
        dest: /root/cis-audit-reports/2.1.3_backup_credentials.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.1.3
          ==========================================
          Control: Secure Backup Credentials
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          SECURITY CHECKS:

          1. Plaintext Passwords in Config:
          {% if 'NONE_FOUND' in plaintext_check.stdout %}
             [PASS] No plaintext passwords found
          {% else %}
             [FAIL] Plaintext passwords detected
             {{ plaintext_check.stdout }}
          {% endif %}

          2. Dedicated Backup User:
          [INFO] User "{{ backup_user }}" created with minimal privileges

          3. mysql_config_editor Login Path:
          {% if login_path_created.rc == 0 %}
             [PASS] Secure credential storage configured
          {% else %}
             [WARN] Run manually: mysql_config_editor set --login-path=backup
          {% endif %}

          STATUS: {% if 'NONE_FOUND' in plaintext_check.stdout %}PASS{% else %}WARN{% endif %}

          CIS BENCHMARK:
          "Backup credentials should be secured. Use mysql_config_editor
          or equivalent secure credential storage."
          ==========================================
