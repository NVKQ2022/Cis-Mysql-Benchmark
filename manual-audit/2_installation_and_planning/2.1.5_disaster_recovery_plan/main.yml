---
# Role: mysql_dr_plan_cis_2_1_5
# Purpose: CIS 2.1.5 - Disaster Recovery Plan (Manual)

- name: "CIS 2.1.5 | Establish disaster recovery plan"
  hosts: all
  become: yes

  vars:
    dr_plan_dir: /etc/mysql
    rto_hours: 4
    rpo_hours: 1

  tasks:

    # 1. Create DR plan document
    - name: "Create disaster recovery plan"
      copy:
        dest: "{{ dr_plan_dir }}/dr_plan.txt"
        mode: '0644'
        content: |
          ==========================================
          MySQL Disaster Recovery Plan
          CIS Benchmark: 2.1.5
          ==========================================

          RECOVERY OBJECTIVES:
          - RTO (Recovery Time Objective): {{ rto_hours }} hours
          - RPO (Recovery Point Objective): {{ rpo_hours }} hours

          BACKUP LOCATIONS:
          - Primary: /backup/mysql
          - Off-site: [CONFIGURE_OFFSITE_LOCATION]

          RECOVERY PROCEDURES:

          1. Full Restore:
             mysql -u root -p < /backup/mysql/latest-full-backup.sql.gz

          2. Point-in-Time Recovery:
             mysqlbinlog mysql-bin.000001 | mysql -u root -p
             (Specify --stop-datetime for specific recovery point)

          3. Partial Restore:
             mysql -u root -p database_name < backup.sql

          CONTACT INFORMATION:
          - DBA Lead: [NAME]
          - Backup Admin: [NAME]
          - Escalation: [CONTACT]

          TESTING SCHEDULE:
          - Full DR test: Quarterly
          - Backup verification: Monthly

          LAST UPDATED: {{ ansible_date_time.iso8601 }}

    # 2. Check DR plan exists
    - name: "Verify DR plan exists"
      stat:
        path: "{{ dr_plan_dir }}/dr_plan.txt"
      register: dr_plan_check

    # 3. Generate audit report
    - name: "Generate DR plan report"
      copy:
        dest: /root/cis-audit-reports/2.1.5_dr_plan.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.1.5
          ==========================================
          Control: Disaster Recovery Plan
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          DR PLAN STATUS:
          - Location: {{ dr_plan_dir }}/dr_plan.txt
          - Exists: {{ 'YES' if dr_plan_check.stat.exists else 'NO' }}

          RECOVERY OBJECTIVES:
          - RTO: {{ rto_hours }} hours
          - RPO: {{ rpo_hours }} hours

          STATUS: {% if dr_plan_check.stat.exists %}PASS{% else %}FAIL{% endif %}

          CIS BENCHMARK:
          "A disaster recovery plan should be established that defines
          RTO, RPO, backup procedures, and testing schedules."
          ==========================================
