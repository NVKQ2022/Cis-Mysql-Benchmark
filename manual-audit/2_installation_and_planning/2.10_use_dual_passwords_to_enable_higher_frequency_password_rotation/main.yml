---
# Role: mysql_dual_password_cis_2_10
# Purpose: CIS 2.10 - Dual Passwords for Rotation (Manual)

- name: "CIS 2.10 | Implement dual passwords"
  hosts: all
  become: yes

  vars:
    mysql_password: "CHANGE_ME"

  tasks:

    # 1. Check dual_password variable
    - name: "Check dual_password variable"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SHOW VARIABLES LIKE 'dual_password';\" 2>/dev/null"
      register: dual_pass_var
      changed_when: false
      failed_when: false

    # 2. Check password history
    - name: "Check password history settings"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SHOW VARIABLES LIKE 'password_history';\" 2>/dev/null"
      register: pass_history
      changed_when: false
      failed_when: false

    # 3. Check password reuse interval
    - name: "Check password reuse interval"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SHOW VARIABLES LIKE 'password_reuse_interval';\" 2>/dev/null"
      register: pass_reuse
      changed_when: false
      failed_when: false

    # 4. Generate audit report
    - name: "Generate dual password report"
      copy:
        dest: /root/cis-audit-reports/2.10_dual_password.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.10
          ==========================================
          Control: Dual Passwords for Rotation
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          PASSWORD SETTINGS:

          dual_password:
          {{ dual_pass_var.stdout | default('Cannot query') }}

          password_history:
          {{ pass_history.stdout | default('Cannot query') }}

          password_reuse_interval:
          {{ pass_reuse.stdout | default('Cannot query') }}

          MANUAL CONFIGURATION REQUIRED:
          Dual passwords allow maintaining old and new passwords
          during rotation period. This requires manual SQL commands:

          SET @@session.dual_password = 1;
          SET PASSWORD = 'new_password', REPLACE(password_history, 'old_hash', 'new_hash');

          STATUS: INFO - Manual verification required

          CIS BENCHMARK:
          "Dual passwords enable higher frequency password rotation
          while minimizing disruption."
          ==========================================
