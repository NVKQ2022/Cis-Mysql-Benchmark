---
# Role: mysql_socket_auth_cis_2_13
# Purpose: CIS 2.13 - Socket Peer-Credential Authentication (Manual)

- name: "CIS 2.13 | Configure socket peer-credential auth"
  hosts: all
  become: yes

  vars:
    mysql_password: "CHANGE_ME"

  tasks:

    # 1. Get authentication plugins
    - name: "List authentication plugins"
      shell: "mysql -u root -p'{{ mysql_password }}' -e \"SELECT user, host, plugin FROM mysql.user ORDER BY plugin;\" 2>/dev/null"
      register: auth_plugins
      changed_when: false
      failed_when: false

    # 2. Count by plugin type
    - name: "Count auth_socket users"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SELECT COUNT(*) FROM mysql.user WHERE plugin='auth_socket';\" 2>/dev/null"
      register: socket_count
      changed_when: false
      failed_when: false

    # 3. Count caching_sha2_password users
    - name: "Count caching_sha2_password users"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SELECT COUNT(*) FROM mysql.user WHERE plugin='caching_sha2_password';\" 2>/dev/null"
      register: sha2_count
      changed_when: false
      failed_when: false

    # 4. Generate audit report
    - name: "Generate socket auth report"
      copy:
        dest: /root/cis-audit-reports/2.13_socket_auth.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.13
          ==========================================
          Control: Socket Peer-Credential Authentication
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          AUTHENTICATION PLUGINS:
          {{ auth_plugins.stdout | default('Cannot query MySQL') }}

          SUMMARY:
          - auth_socket users: {{ socket_count.stdout | default('0') }}
          - caching_sha2_password users: {{ sha2_count.stdout | default('0') }}

          RECOMMENDATIONS:
          - auth_socket: Use for local admin accounts (OS root)
          - caching_sha2_password: Use for remote connections

          TO CONFIGURE auth_socket:
            ALTER USER 'root'@'localhost' IDENTIFIED WITH auth_socket;

          STATUS: INFO - Review authentication policy

          CIS BENCHMARK:
          "Socket peer-credential authentication allows passwordless
          login from local socket for OS root user."
          ==========================================
