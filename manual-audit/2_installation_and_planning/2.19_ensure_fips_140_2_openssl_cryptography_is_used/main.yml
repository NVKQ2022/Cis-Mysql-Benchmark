---
# Role: mysql_fips_cis_2_19
# Purpose: CIS 2.19 - FIPS 140-2 OpenSSL Cryptography (Manual)

- name: "CIS 2.19 | Check FIPS 140-2 OpenSSL"
  hosts: all
  become: yes

  tasks:

    # 1. Get OpenSSL version
    - name: "Get OpenSSL version"
      shell: openssl version
      register: openssl_version
      changed_when: false

    # 2. Check OpenSSL FIPS status
    - name: "Check OpenSSL FIPS status"
      shell: openssl fips 2>&1 || true
      register: fips_status
      changed_when: false
      failed_when: false

    # 3. Check OpenSSL config
    - name: "Check OpenSSL FIPS config"
      shell: "grep -i fips /etc/ssl/openssl.cnf 2>/dev/null || echo 'FIPS_NOT_CONFIGURED'"
      register: fips_config
      changed_when: false
      failed_when: false

    # 4. Generate audit report
    - name: "Generate FIPS report"
      copy:
        dest: /root/cis-audit-reports/2.19_fips_openssl.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.19
          ==========================================
          Control: FIPS 140-2 OpenSSL Cryptography
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          OPENSSL INFORMATION:
          Version: {{ openssl_version.stdout }}

          FIPS STATUS:
          {{ fips_status.stdout }}

          FIPS CONFIGURATION:
          {% if 'FIPS_NOT_CONFIGURED' in fips_config.stdout %}
             FIPS is not configured in openssl.cnf
          {% else %}
             {{ fips_config.stdout }}
          {% endif %}

          MANUAL VERIFICATION REQUIRED:
          FIPS 140-2 compliance requires:
          1. OpenSSL FIPS module installed
          2. FIPS mode enabled in /etc/ssl/openssl.cnf:
             fips_mode = on
          3. Restart MySQL after enabling

          STATUS: INFO - Manual verification required

          CIS BENCHMARK:
          "FIPS 140-2 ensures cryptographic modules meet federal
          security standards. Verify with security team."
          ==========================================
