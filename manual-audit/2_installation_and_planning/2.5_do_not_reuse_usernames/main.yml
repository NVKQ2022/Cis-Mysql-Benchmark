---
# Role: mysql_username_reuse_cis_2_5
# Purpose: CIS 2.5 - Do Not Reuse Usernames (Manual)

- name: "CIS 2.5 | Do not reuse usernames"
  hosts: all
  become: yes

  vars:
    mysql_password: "CHANGE_ME"

  tasks:

    # 1. List all MySQL users
    - name: "List all MySQL users"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SELECT CONCAT(user, '@', host) FROM mysql.user ORDER BY user;\" 2>/dev/null"
      register: mysql_users
      changed_when: false
      failed_when: false

    # 2. Check for root usage by applications
    - name: "Check for root usage by applications"
      shell: "mysql -u root -p'{{ mysql_password }}' -N -e \"SELECT user, host FROM mysql.user WHERE user='root';\" 2>/dev/null"
      register: root_users
      changed_when: false
      failed_when: false

    # 3. Generate audit report
    - name: "Generate username reuse report"
      copy:
        dest: /root/cis-audit-reports/2.5_username_reuse.txt
        mode: '0644'
        content: |
          ==========================================
          CIS MySQL 8.4 - Audit Report 2.5
          ==========================================
          Control: Do Not Reuse Usernames
          Date: {{ ansible_date_time.iso8601 }}
          Host: {{ inventory_hostname }}
          ==========================================

          MYSQL USERS:
          {{ mysql_users.stdout | default('Cannot query MySQL') }}

          ROOT ACCOUNTS:
          {{ root_users.stdout | default('Cannot query MySQL') }}

          RECOMMENDATIONS:
          - Each application should have its own MySQL user
          - Avoid using 'root' for application connections
          - Use naming convention: appname_databasename

          STATUS: INFO - Manual review required

          CIS BENCHMARK:
          "Usernames should not be reused across multiple applications.
          Each application should have a dedicated MySQL user."
          ==========================================
