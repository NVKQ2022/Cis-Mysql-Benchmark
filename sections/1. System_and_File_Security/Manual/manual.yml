---
- name: Init audit log buffer
  ansible.builtin.set_fact:
    audit_lines: []

# ==============================================================================
# CIS 1.1 – datadir Partition
# ==============================================================================

- name: "[1.1] Audit – Get datadir from MySQL"
  community.mysql.mysql_query:
    login_unix_socket: /var/run/mysqld/mysqld.sock
    query: "SELECT @@datadir;"
  register: mysql_datadir
  changed_when: false
  become: yes

# Lấy path thật
- name: "[1.1] Set datadir path"
  set_fact:
    datadir_path: "{{ mysql_datadir.query_result[0][0]['@@datadir'] }}"

# Lấy mount point
- name: "[1.1] Get mount point using df"
  ansible.builtin.shell: >
    df -P {{ datadir_path }} | awk 'NR==2 {print $6}'
  register: datadir_mount_cmd
  changed_when: false

# Đánh giá CIS
- name: "[1.1] Evaluate CIS status"
  ansible.builtin.set_fact:
    datadir_mount_point: "{{ datadir_mount_cmd.stdout }}"
    cis_1_1_status: >-
      {% if datadir_mount_cmd.stdout in ['/', '/var', '/usr'] %}
      FAIL
      {% else %}
      PASS
      {% endif %}

# Log
- name: "[1.1] Log result"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [1.1] datadir Partition Configuration (Manual - Level 1)
      datadir    : {{ datadir_path }}
      Mounted on : {{ datadir_mount_cmd.stdout }}
      Result     : {{ cis_1_1_status }}
      ----------------------------------------------------------------

# ==============================================================================
# CIS 1.7 – Sandbox Environment
# ==============================================================================

# 🔹 Check chroot bằng module file + lineinfile-like logic
- name: CIS 1.7 - Đọc file config MySQL
  ansible.builtin.slurp:
    src: /etc/mysql/mysql.conf.d/mysqld.cnf
  register: mysql_conf
  ignore_errors: true

- name: CIS 1.7 - Kiểm tra có chroot không
  ansible.builtin.set_fact:
    chroot_check: >-
      {{
        (mysql_conf.content | b64decode).split('\n')
        | select('search', 'chroot')
        | reject('search', '^#')
        | list
      }}

# 🔹 Check systemd user
- name: CIS 1.7 - Lấy service facts
  ansible.builtin.service_facts:

- name: CIS 1.7 - Kiểm tra user chạy MySQL
  ansible.builtin.set_fact:
    systemd_check: "{{ ansible_facts.services['mysql.service'] | default({}) }}"

# 🔹 Check docker (không dùng shell → dùng file existence)
- name: CIS 1.7 - Kiểm tra docker runtime
  ansible.builtin.stat:
    path: /.dockerenv
  register: docker_env

- name: CIS 1.7 - Đánh giá
  ansible.builtin.set_fact:
    cis_1_7_status: >-
      {% if chroot_check | length > 0 %}
      PASS (chroot)
      {% elif systemd_check and systemd_check.state == 'running' %}
      PASS (systemd)
      {% elif docker_env.stat.exists %}
      PASS (docker)
      {% else %}
      FAIL
      {% endif %}

- name: "1.7 – Ghi kết quả"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [1.7] Sandbox Environment (Automated - Level 1)
      Result : {{ cis_1_7_status }}
      ----------------------------------------------------------------

# ==============================================================================
# WRITE LOG LOCAL
# ==============================================================================

- name: Write remediation log on remote target (tránh quá tải local connection)
  become: yes
  copy:
    dest: "/tmp/cis_mysql_audit_manual.log"
    content: "{{ audit_lines | join('\n') }}"
    mode: '0644'

- name: Fetch log về controller
  become: yes
  fetch:
    src: "/tmp/cis_mysql_audit_manual.log"
    dest: "./cis_mysql_audit_manual.log"
    flat: yes

- name: Xóa file log tạm trên remote
  become: yes
  file:
    path: "/tmp/cis_mysql_audit_manual.log"
    state: absent
