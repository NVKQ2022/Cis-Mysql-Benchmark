---
- name: Init audit log buffer
  ansible.builtin.set_fact:
    audit_lines: []

- name: "[2.1.1] Manual – Ensure a Backup Policy is in Place"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [2.1.1] Backup Policy (Manual - Level 1)
      Status : MANUAL CHECK REQUIRED
      Action : Verify that a documented backup policy exists,
               including schedule, retention, and responsibilities.
      -----------------------------------------------------------------

- name: "[2.1.2] Manual – Verify Backups are Valid and Restorable"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [2.1.2] Backup Validation (Manual - Level 2)
      Status : MANUAL CHECK REQUIRED
      Action : Verify that backup restoration tests are performed
               regularly (e.g., monthly restore drills).
      -----------------------------------------------------------------

- name: "[2.1.3] Manual – Secure Backup Credentials"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [2.1.3] Secure Backup Credentials (Manual - Level 1)
      Status : MANUAL CHECK REQUIRED
      Action : Verify that backup scripts do not store MySQL
               credentials in plain text. Use mysql_config_editor
               or a secrets management solution.
      -----------------------------------------------------------------

- name: "[2.1.5] Manual – Establish a Disaster Recovery Plan"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [2.1.5] Disaster Recovery Plan (Manual - Level 2)
      Status : MANUAL CHECK REQUIRED
      Action : Verify that a documented DR plan exists, including
               RPO/RTO objectives, failover procedures, and contact lists.
      -----------------------------------------------------------------

- name: "[2.1.6] Manual – Backup Configuration and Related Files"
  become: yes
  block:
    - name: "2.1.6 – Find MySQL configuration files"
      ansible.builtin.find:
        paths:
          - /etc/mysql
          - /etc/my.cnf.d
        patterns: "*.cnf"
      register: config_files

    - name: "2.1.6 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.1.6] Backup Configuration Files (Manual - Level 2)
          Status    : MANUAL CHECK REQUIRED
          Configs found:
          {% for f in config_files.files %}
            - {{ f.path }}
          {% endfor %}
          Action    : Ensure these files are included in the backup policy.
          -----------------------------------------------------------------

- name: "[2.3] Manual – Dedicate the Machine Running MySQL"
  ansible.builtin.set_fact:
    audit_lines: "{{ audit_lines + [ log_block ] }}"
  vars:
    log_block: |
      [2.3] Dedicated Machine (Manual - Level 1)
      Status : MANUAL CHECK REQUIRED
      Action : Verify that the MySQL server runs on a dedicated
               machine (not shared with web server, app server, etc.).
      -----------------------------------------------------------------

- name: "[2.4] Manual – Do Not Specify Passwords on the Command Line"
  become: yes
  block:
    - name: "2.4 – Check process list for password args"
      ansible.builtin.shell: |
        ps aux | grep mysql | grep -E '(mysql|mysqld)' | grep -v grep || true
      register: check_2_4
      changed_when: false

    - name: "2.4 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.4] Passwords on Command Line (Manual - Level 1)
          Status : MANUAL CHECK REQUIRED
          Review the following processes for password arguments:
          {{ check_2_4.stdout | default('(no suspicious processes found)') }}
          Action : Verify no MySQL processes expose passwords in cmdline.
          -----------------------------------------------------------------

- name: "[2.5] Manual – Do Not Reuse Usernames"
  become: yes
  block:
    - name: "2.5 – List MySQL users"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: "SELECT user, host FROM mysql.user ORDER BY user;"
      register: check_2_5
      changed_when: false

    - name: "2.5 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.5] Username Reuse (Manual - Level 2)
          Current users:
          {% for row in check_2_5.query_result[0] %}
            - {{ row['user'] }}@{{ row['host'] }}
          {% endfor %}
          Action : Verify that usernames are unique and do not match
                   OS account names or application service accounts.
          -----------------------------------------------------------------

- name: "[2.6] Manual – Ensure Non-Default, Unique Cryptographic Material"
  become: yes
  block:
    - name: "2.6 – List SSL files"
      ansible.builtin.find:
        paths:
          - /etc/mysql
          - /var/lib/mysql
        patterns: "*.pem"
      register: cert_files

    - name: "2.6 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.6] Unique Cryptographic Material (Manual - Level 2)
          SSL certificates found:
          {% for f in cert_files.files | default([]) %}
            - {{ f.path }}
          {% endfor %}
          Action : Verify SHA256 fingerprints differ from default
                   auto-generated certificates (`openssl x509 -fingerprint -in <file>`).
          -----------------------------------------------------------------

- name: "[2.10] Manual – Use Dual Passwords for Frequent Password Rotation"
  become: yes
  block:
    - name: "2.10 – Check users with dual passwords"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: |
          SELECT user, host, password_last_changed,
                 JSON_EXTRACT(user_attributes, '$.additional_password') AS dual_password
          FROM mysql.user
          WHERE user_attributes IS NOT NULL;
      register: check_2_10
      changed_when: false

    - name: "2.10 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.10] Dual Passwords (Manual - Level 2)
          Users with dual password attribute:
          {% for row in check_2_10.query_result[0] | default([]) %}
            - {{ row['user'] }}@{{ row['host'] }}
              dual_password: {{ row['dual_password'] | default('NONE') }}
          {% else %}
            (none found)
          {% endfor %}
          Action : Consider using dual passwords for privileged accounts
                   requiring frequent rotation.
          -----------------------------------------------------------------

- name: "[2.11] Manual – Lock Out Accounts Not Currently in Use"
  become: yes
  block:
    - name: "2.11 – Find unused/locked accounts"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: |
          SELECT user, host, account_locked,
                 COALESCE(password_expired, 'N') AS password_expired
          FROM mysql.user
          WHERE account_locked = 'Y' OR password_expired = 'Y';
      register: check_2_11
      changed_when: false

    - name: "2.11 – List all users for review"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: |
          SELECT user, host, account_locked
          FROM mysql.user
          ORDER BY user;
      register: check_2_11_all
      changed_when: false

    - name: "2.11 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.11] Lock Unused Accounts (Manual - Level 1)
          Locked/expired accounts:
          {% for row in check_2_11.query_result[0] | default([]) %}
            - {{ row['user'] }}@{{ row['host'] }}
              locked={{ row['account_locked'] }}, expired={{ row['password_expired'] }}
          {% else %}
            (none)
          {% endfor %}
          All MySQL accounts:
          {% for row in check_2_11_all.query_result[0] | default([]) %}
            - {{ row['user'] }}@{{ row['host'] }} (locked={{ row['account_locked'] }})
          {% endfor %}
          Action : Review and lock any accounts not currently in use.
          -----------------------------------------------------------------

- name: "[2.13] Manual – Use Socket Peer-Credential Authentication"
  become: yes
  block:
    - name: "2.13 – Check auth_socket plugin usage"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: |
          SELECT user, host, plugin
          FROM mysql.user
          WHERE plugin IN ('auth_socket', 'unix_socket');
      register: check_2_13
      changed_when: false

    - name: "2.13 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.13] Socket Peer-Credential Authentication (Manual - Level 2)
          Users using auth_socket/unix_socket:
          {% for row in check_2_13.query_result[0] | default([]) %}
            - {{ row['user'] }}@{{ row['host'] }} ({{ row['plugin'] }})
          {% else %}
            (none found)
          {% endfor %}
          Action : Consider using auth_socket for local service accounts
                   to avoid password-based auth.
          -----------------------------------------------------------------

- name: "[2.19] Manual – Ensure FIPS 140-2 OpenSSL Cryptography"
  become: yes
  block:
    - name: "2.19 – Check FIPS mode"
      ansible.builtin.shell: |
        openssl md5 /dev/null 2>&1 || true
      register: fips_check
      changed_when: false
      failed_when: false

    - name: "2.19 – Check MySQL SSL status"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: "SHOW STATUS LIKE 'Ssl_version';"
      register: check_2_19
      changed_when: false

    - name: "2.19 – Set CIS status"
      ansible.builtin.set_fact:
        cis_2_19_status: >-
          {% if 'FIPS' in fips_check.stderr %}PASS
          {% else %}MANUAL CHECK REQUIRED{% endif %}

    - name: "2.19 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [2.19] FIPS 140-2 Cryptography (Manual - Level 2)
          OpenSSL FIPS check  : {{ 'FIPS detected' if 'FIPS' in fips_check.stderr else 'Check manually' }}
          MySQL SSL version   : {{ check_2_19.query_result[0][0]['Value'] | default('(unknown)') }}
          Result              :  {{ cis_2_19_status }}
          -----------------------------------------------------------------

- name: Write audit log on remote target
  become: yes
  copy:
    dest: "/tmp/cis_mysql_audit_manual_section2.log"
    content: "{{ audit_lines | join('\n') }}"
    mode: '0644'

- name: Fetch log about controller
  become: yes
  fetch:
    src: "/tmp/cis_mysql_audit_manual_section2.log"
    dest: "../../reports/cis_mysql_audit_manual_section2.log"
    flat: yes

- name: Remove temp log file
  become: yes
  file:
    path: "/tmp/cis_mysql_audit_manual_section2.log"
    state: absent
