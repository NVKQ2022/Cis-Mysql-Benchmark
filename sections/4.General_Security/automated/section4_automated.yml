---
- name: "CIS MySQL 8.4 – Section 4 [AUTOMATED] Remediation"
  hosts: mysql_servers
  become: true
  vars:
    mysql_user: root
    mysql_pass: "MatKhau@123"
    mysql_cnf: /etc/mysql/mysql.conf.d/mysqld.cnf
    secure_file_dir: /var/lib/mysql-files
    example_databases:
      - employees
      - world
      - world_x
      - sakila
      - airportdb
      - menagerie
      - test
    strict_sql_mode: >-
      STRICT_ALL_TABLES,ONLY_FULL_GROUP_BY,STRICT_TRANS_TABLES,
      NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,
      NO_ENGINE_SUBSTITUTION
    log_file: "./cis_section4_automated_audit.log"

  tasks:

    - name: Init audit log buffer
      ansible.builtin.set_fact:
        audit_lines: []

    # ----------------------------------------------------------------
    # 4.2 – Example/Test Databases
    # ----------------------------------------------------------------
    - name: "[4.2] Audit & Fix – Example/Test Databases"
      block:
        - name: "4.2 – Tìm database example/test"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT SCHEMA_NAME FROM information_schema.SCHEMATA WHERE SCHEMA_NAME IN ('{{ example_databases | join(\"','\") }}')"
          register: check_4_2

        - name: "4.2 – Set CIS status trước khi fix"
          ansible.builtin.set_fact:
            cis_4_2_status_before: >-
              {{ 'FAIL – tìm thấy: ' ~ (check_4_2.query_result[0] | map(attribute='SCHEMA_NAME') | list | join(', '))
                 if check_4_2.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "4.2 – Xóa database example/test"
          community.mysql.mysql_db:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            name: "{{ item.SCHEMA_NAME }}"
            state: absent
          loop: "{{ check_4_2.query_result[0] }}"
          when: check_4_2.query_result[0] | length > 0

        - name: "4.2 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.2] Example/Test Databases (Automated - Level 1)
              Before : {{ cis_4_2_status_before }}
              Action : {{ 'Đã xóa: ' ~ (check_4_2.query_result[0] | map(attribute='SCHEMA_NAME') | list | join(', ')) if check_4_2.query_result[0] | length > 0 else 'Không cần xử lý' }}
              Result : {{ 'PASS' if check_4_2.query_result[0] | length == 0 else 'FIXED' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.3 – allow-suspicious-udfs
    # ----------------------------------------------------------------
    - name: "[4.3] Audit & Fix – allow-suspicious-udfs"
      block:
        - name: "4.3 – Kiểm tra allow-suspicious-udfs trong my.cnf"
          ansible.builtin.shell: >
            grep -iE "^\s*allow-suspicious-udfs" {{ mysql_cnf }} || echo "NONE"
          register: check_4_3
          changed_when: false

        - name: "4.3 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_3_status: "{{ 'FAIL' if check_4_3.stdout != 'NONE' else 'PASS' }}"

        - name: "4.3 – Xóa allow-suspicious-udfs"
          ansible.builtin.lineinfile:
            path: "{{ mysql_cnf }}"
            regexp: '^\s*allow-suspicious-udfs'
            state: absent
          when: cis_4_3_status == 'FAIL'
          notify: Restart MySQL

        - name: "4.3 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.3] allow-suspicious-udfs (Automated - Level 2)
              Found  : {{ check_4_3.stdout | default('NONE') }}
              Result : {{ cis_4_3_status }}
              Action : {{ 'Đã xóa khỏi ' ~ mysql_cnf if cis_4_3_status == 'FAIL' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.4 – local_infile
    # ----------------------------------------------------------------
    - name: "[4.4] Audit & Fix – local_infile"
      block:
        - name: "4.4 – Kiểm tra local_infile"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SHOW VARIABLES WHERE Variable_name = 'local_infile'"
          register: check_4_4

        - name: "4.4 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_4_status: "{{ 'PASS' if check_4_4.query_result[0][0].Value | upper == 'OFF' else 'FAIL' }}"

        - name: "4.4 – Tắt local_infile trong my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: local-infile
            value: "0"
          when: cis_4_4_status == 'FAIL'
          notify: Restart MySQL

        - name: "4.4 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.4] local_infile (Automated - Level 1)
              Current : {{ check_4_4.query_result[0][0].Value }}
              Result  : {{ cis_4_4_status }}
              Action  : {{ 'Đã thêm local-infile=0 vào ' ~ mysql_cnf if cis_4_4_status == 'FAIL' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.5 – skip-grant-tables
    # ----------------------------------------------------------------
    - name: "[4.5] Audit & Fix – skip-grant-tables"
      block:
        - name: "4.5 – Kiểm tra skip-grant-tables trong my.cnf"
          ansible.builtin.shell: >
            grep -iE "^\s*skip-grant-tables\s*=?\s*(1|TRUE|ON)" {{ mysql_cnf }} || echo "NONE"
          register: check_4_5
          changed_when: false

        - name: "4.5 – Kiểm tra process mysqld"
          ansible.builtin.shell: >
            ps aux | grep mysqld | grep "skip-grant-tables" | grep -v grep || echo "NONE"
          register: check_4_5_proc
          changed_when: false

        - name: "4.5 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_5_status: >-
              {{ 'FAIL – trong my.cnf' if check_4_5.stdout != 'NONE'
                 else ('FAIL – trong process' if check_4_5_proc.stdout != 'NONE'
                 else 'PASS') }}

        - name: "4.5 – Fix skip-grant-tables trong my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: skip-grant-tables
            value: "FALSE"
          when: check_4_5.stdout != 'NONE'
          notify: Restart MySQL

        - name: "4.5 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.5] skip-grant-tables (Automated - Level 1)
              In my.cnf : {{ check_4_5.stdout | default('NONE') }}
              In process: {{ check_4_5_proc.stdout | default('NONE') }}
              Result    : {{ cis_4_5_status }}
              Action    : {{ 'Đã đặt skip-grant-tables=FALSE' if check_4_5.stdout != 'NONE' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.6 – Symbolic Links
    # ----------------------------------------------------------------
    - name: "[4.6] Audit & Fix – Symbolic Links"
      block:
        - name: "4.6 – Kiểm tra have_symlink"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SHOW VARIABLES LIKE 'have_symlink'"
          register: check_4_6

        - name: "4.6 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_6_status: "{{ 'PASS' if check_4_6.query_result[0][0].Value | upper == 'DISABLED' else 'FAIL' }}"

        - name: "4.6 – Tắt symbolic links trong my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: skip-symbolic-links
            value: "YES"
          when: cis_4_6_status == 'FAIL'
          notify: Restart MySQL

        - name: "4.6 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.6] Symbolic Links (Automated - Level 1)
              have_symlink : {{ check_4_6.query_result[0][0].Value }}
              Result       : {{ cis_4_6_status }}
              Action       : {{ 'Đã thêm skip-symbolic-links=YES vào ' ~ mysql_cnf if cis_4_6_status == 'FAIL' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.7 – secure_file_priv
    # ----------------------------------------------------------------
    - name: "[4.7] Audit & Fix – secure_file_priv"
      block:
        - name: "4.7 – Kiểm tra secure_file_priv"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SHOW GLOBAL VARIABLES WHERE Variable_name = 'secure_file_priv'"
          register: check_4_7

        - name: "4.7 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_7_val: "{{ check_4_7.query_result[0][0].Value | default('') }}"
            cis_4_7_status: >-
              {{ 'PASS' if check_4_7.query_result[0][0].Value | default('') not in ['', None]
                 else 'FAIL – secure_file_priv rỗng' }}

        - name: "4.7 – Tạo thư mục secure_file_priv"
          ansible.builtin.file:
            path: "{{ secure_file_dir }}"
            state: directory
            owner: mysql
            group: mysql
            mode: "0750"
          when: cis_4_7_status == 'FAIL – secure_file_priv rỗng'

        - name: "4.7 – Cấu hình secure_file_priv trong my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: secure_file_priv
            value: "{{ secure_file_dir }}"
          when: cis_4_7_status == 'FAIL – secure_file_priv rỗng'
          notify: Restart MySQL

        - name: "4.7 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.7] secure_file_priv (Automated - Level 1)
              Current : {{ cis_4_7_val | default('(empty)') }}
              Result  : {{ cis_4_7_status }}
              Action  : {{ 'Đã tạo thư mục và cấu hình secure_file_priv=' ~ secure_file_dir if cis_4_7_status != 'PASS' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.8 – sql_mode STRICT_ALL_TABLES
    # ----------------------------------------------------------------
    - name: "[4.8] Audit & Fix – sql_mode STRICT_ALL_TABLES"
      block:
        - name: "4.8 – Kiểm tra sql_mode"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SHOW VARIABLES LIKE 'sql_mode'"
          register: check_4_8

        - name: "4.8 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_8_status: >-
              {{ 'PASS' if 'STRICT_ALL_TABLES' in check_4_8.query_result[0][0].Value
                 else 'FAIL' }}

        - name: "4.8 – Thiết lập sql_mode"
          community.mysql.mysql_variables:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            variable: sql_mode
            value: "{{ strict_sql_mode }}"
            mode: global
          when: cis_4_8_status == 'FAIL'

        - name: "4.8 – Ghi sql_mode vào my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: sql_mode
            value: "{{ strict_sql_mode }}"
          when: cis_4_8_status == 'FAIL'

        - name: "4.8 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.8] sql_mode STRICT_ALL_TABLES (Automated - Level 1)
              Current : {{ check_4_8.query_result[0][0].Value }}
              Result  : {{ cis_4_8_status }}
              Action  : {{ 'Đã thiết lập sql_mode với STRICT_ALL_TABLES' if cis_4_8_status == 'FAIL' else 'Không cần xử lý' }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 4.9 – TDE At-Rest Encryption
    # ----------------------------------------------------------------
    - name: "[4.9] Audit & Fix – TDE At-Rest Encryption"
      block:
        - name: "4.9 – Kiểm tra MySQL Edition"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SHOW VARIABLES LIKE 'license'"
          register: check_4_9_edition

        - name: "4.9 – Cài keyring_file vào my.cnf"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: "{{ item.key }}"
            value: "{{ item.value }}"
          loop:
            - { key: early-plugin-load,  value: "keyring_file.so" }
            - { key: keyring_file_data,  value: "/var/lib/mysql-keyring/keyring" }

        - name: "4.9 – Tạo thư mục keyring"
          ansible.builtin.file:
            path: /var/lib/mysql-keyring
            state: directory
            owner: mysql
            group: mysql
            mode: "0750"

        - name: "4.9 – Xóa audit-log config nếu không phải Enterprise"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: "{{ item }}"
            state: absent
          loop:
            - audit-log
            - audit-log-format
            - audit-log-encryption
          when: "'Enterprise' not in (check_4_9_edition.query_result[0][0].Value | default(''))"

        - name: "4.9 – Cấu hình audit log (Enterprise only)"
          ansible.builtin.ini_file:
            path: "{{ mysql_cnf }}"
            section: mysqld
            option: "{{ item.key }}"
            value: "{{ item.value }}"
          loop:
            - { key: audit-log,            value: "FORCE_PLUS_PERMANENT" }
            - { key: audit-log-format,     value: "JSON" }
            - { key: audit-log-encryption, value: "AES" }
          when: "'Enterprise' in (check_4_9_edition.query_result[0][0].Value | default(''))"

        - name: "4.9 – Restart MySQL để load keyring"
          ansible.builtin.service:
            name: mysql
            state: restarted

        - name: "4.9 – Chờ MySQL sẵn sàng"
          ansible.builtin.wait_for:
            port: 3306
            delay: 5
            timeout: 60

        - name: "4.9 – Xác nhận keyring ACTIVE"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT PLUGIN_NAME, PLUGIN_STATUS FROM information_schema.PLUGINS WHERE PLUGIN_NAME = 'keyring_file'"
          register: check_4_9_keyring
          retries: 3
          delay: 5
          until: check_4_9_keyring is not failed

        - name: "4.9 – Bật các biến mã hóa"
          community.mysql.mysql_variables:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            variable: "{{ item.var }}"
            value: "{{ item.val }}"
            mode: persist
          loop:
            - { var: table_encryption_privilege_check, val: "ON" }
            - { var: binlog_encryption,                val: "ON" }
            - { var: innodb_redo_log_encrypt,          val: "ON" }
            - { var: innodb_undo_log_encrypt,          val: "ON" }
            - { var: general_log,                      val: "OFF" }

        - name: "4.9 – Lấy tablespace chưa mã hóa"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: >
              SELECT NAME FROM information_schema.INNODB_TABLESPACES
              WHERE NAME NOT IN ('innodb_temporary','sys/sys_config')
              AND ENCRYPTION = 'N'
          register: check_4_9_ts

        - name: "4.9 – Mã hóa table (file-per-table)"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "ALTER TABLE `{{ item.NAME.split('/')[0] }}`.`{{ item.NAME.split('/')[1] }}` ENCRYPTION = 'Y'"
          loop: "{{ check_4_9_ts.query_result[0] }}"
          when:
            - check_4_9_ts.query_result[0] | length > 0
            - "'/' in item.NAME"
          ignore_errors: true

        - name: "4.9 – Mã hóa tablespace"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "ALTER TABLESPACE `{{ item.NAME }}` ENCRYPTION = 'Y'"
          loop: "{{ check_4_9_ts.query_result[0] }}"
          when:
            - check_4_9_ts.query_result[0] | length > 0
            - "'/' not in item.NAME"
          ignore_errors: true

        - name: "4.9 – Mã hóa system tablespace mysql"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "ALTER TABLESPACE mysql ENCRYPTION = 'Y'"
          ignore_errors: true

        - name: "4.9 – Set CIS status"
          ansible.builtin.set_fact:
            cis_4_9_keyring_status: >-
              {{ 'PASS' if (check_4_9_keyring.query_result[0] | length > 0
                 and check_4_9_keyring.query_result[0][0].PLUGIN_STATUS == 'ACTIVE')
                 else 'FAIL – keyring chưa ACTIVE' }}

        - name: "4.9 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [4.9] TDE At-Rest Encryption (Automated - Level 2)
              MySQL Edition       : {{ check_4_9_edition.query_result[0][0].Value }}
              keyring_file plugin : {{ cis_4_9_keyring_status }}
              Unencrypted TS      : {{ check_4_9_ts.query_result[0] | map(attribute='NAME') | list | join(', ') | default('none') }}
              Action              : Đã bật binlog_encryption, innodb_redo_log_encrypt, innodb_undo_log_encrypt, table_encryption_privilege_check, tắt general_log
              Result              : {{ cis_4_9_keyring_status }}
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # Write log
    # ----------------------------------------------------------------
    - name: Write audit log
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ log_file }}"
        content: "{{ audit_lines | join('\n') }}"

  handlers:
    - name: Restart MySQL
      ansible.builtin.service:
        name: mysql
        state: restarted
    - name: Wait for MySQL ready
      ansible.builtin.wait_for:
        port: 3306
        delay: 5
        timeout: 60
      listen: "Restart MySQL"
