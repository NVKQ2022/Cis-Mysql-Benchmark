- name: "[5.9] Audit – DML/DDL Grants per Database"
  block:
    - name: "5.9 – Get DML/DDL grants"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: >
          SELECT User, Host, Db FROM mysql.db
          WHERE Select_priv='Y' OR Insert_priv='Y' OR Update_priv='Y'
             OR Delete_priv='Y' OR Create_priv='Y' OR Drop_priv='Y' OR Alter_priv='Y'
      register: check_5_9
      changed_when: false

    - name: "5.9 – Set CIS status"
      ansible.builtin.set_fact:
        cis_5_9_status: >-
          {{ 'MANUAL CHECK REQUIRED – Review ' ~ (check_5_9.query_result[0] | length) ~ ' grant(s)'
             if check_5_9.query_result[0] | length > 0
             else 'PASS' }}

    - name: "5.9 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [5.9] DML/DDL Grants per Database (Manual - Level 1)
          Grants: {{ check_5_9.query_result[0] | default([]) }}
          Result: {{ cis_5_9_status }}
          Fix   : REVOKE SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER ON <db>.* FROM '<user>'@'<host>';
          -----------------------------------------------------------------

- name: "[5.10] Audit – Stored Procedures DEFINER"
  block:
    - name: "5.10 – List stored procedures/functions"
      community.mysql.mysql_query:
        login_unix_socket: /var/run/mysqld/mysqld.sock
        query: "SELECT ROUTINE_SCHEMA, ROUTINE_NAME, DEFINER, SECURITY_TYPE FROM information_schema.ROUTINES WHERE ROUTINE_TYPE IN ('FUNCTION', 'PROCEDURE')"
      register: check_5_10
      changed_when: false
      ignore_errors: true

    - name: "5.10 – Set CIS status"
      ansible.builtin.set_fact:
        cis_5_10_status: >-
          {{ 'MANUAL CHECK REQUIRED – Review ' ~ (check_5_10.query_result[0] | default([]) | length) ~ ' routine(s)'
             if (check_5_10.query_result[0] | default([]) | length) > 0
             else 'PASS' }}

    - name: "5.10 – Ghi kết quả"
      ansible.builtin.set_fact:
        audit_lines: "{{ audit_lines + [ log_block ] }}"
      vars:
        log_block: |
          [5.10] Stored Procedures DEFINER/INVOKER (Manual - Level 1)
          Routines: {{ check_5_10.query_result[0] | default([]) }}
          Result  : {{ cis_5_10_status }}
          Fix     : SHOW CREATE PROCEDURE <name>; DROP and recreate with proper DEFINER
          -----------------------------------------------------------------

