- name: Write audit log on remote target
  become: yes
  copy:
    dest: "/tmp/cis_mysql_audit_manual_section5.log"
    content: "{{ audit_lines | join('\n') }}"
    mode: '0644'

- name: Fetch log about controller
  become: yes
  fetch:
    src: "/tmp/cis_mysql_audit_manual_section5.log"
    dest: "../../reports/cis_mysql_audit_manual_section5.log"
    flat: yes

- name: Remove temp log file
  become: yes
  file:
    path: "/tmp/cis_mysql_audit_manual_section5.log"
    state: absent
