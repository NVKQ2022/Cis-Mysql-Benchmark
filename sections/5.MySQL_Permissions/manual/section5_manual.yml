---
- name: "CIS MySQL 8.4 – Section 5 [MANUAL] Audit"
  hosts: mysql_servers
  become: true
  vars:
    mysql_user: root
    mysql_pass: "MatKhau@123"
    log_file: "./cis_section5_manual_audit.log"

  tasks:

    - name: Init audit log buffer
      ansible.builtin.set_fact:
        audit_lines: []

    # ----------------------------------------------------------------
    # 5.1 – Full Database Access
    # ----------------------------------------------------------------
    - name: "[5.1] Audit – Full Database Access"
      block:
        - name: "5.1 – Lấy toàn bộ user privileges"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: >
              SELECT grantee, privilege_type, is_grantable
              FROM information_schema.user_privileges
              WHERE grantee NOT LIKE "'mysql.%localhost'"
          register: check_5_1

        - name: "5.1 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.1] Full Database Access (Manual - Level 1)
              Users: {{ check_5_1.query_result[0] | map(attribute='grantee') | unique | list | join(', ') }}
              Result: MANUAL – Xem xét và revoke nếu không phải admin
              Fix   : REVOKE <privilege> ON *.* FROM '<user>'@'<host>';
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.2 – FILE Privilege
    # ----------------------------------------------------------------
    - name: "[5.2] Audit – FILE Privilege"
      block:
        - name: "5.2 – Tìm user có quyền FILE"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'FILE'"
          register: check_5_2

        - name: "5.2 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_2_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_2.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_2.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.2 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.2] FILE Privilege (Manual - Level 1)
              Users : {{ check_5_2.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_2_status }}
              Fix   : REVOKE FILE ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.3 – PROCESS Privilege
    # ----------------------------------------------------------------
    - name: "[5.3] Audit – PROCESS Privilege"
      block:
        - name: "5.3 – Tìm user có quyền PROCESS"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'PROCESS'"
          register: check_5_3

        - name: "5.3 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_3_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_3.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_3.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.3 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.3] PROCESS Privilege (Manual - Level 2)
              Users : {{ check_5_3.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_3_status }}
              Fix   : REVOKE PROCESS ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.4 – SUPER Privilege
    # ----------------------------------------------------------------
    - name: "[5.4] Audit – SUPER Privilege"
      block:
        - name: "5.4 – Tìm user có quyền SUPER"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'SUPER'"
          register: check_5_4

        - name: "5.4 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_4_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_4.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_4.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.4 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.4] SUPER Privilege (Manual - Level 1)
              Users : {{ check_5_4.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_4_status }}
              Fix   : GRANT BINLOG_ADMIN, SYSTEM_VARIABLES_ADMIN ON *.* TO <user>;
                      REVOKE SUPER ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.5 – SHUTDOWN Privilege
    # ----------------------------------------------------------------
    - name: "[5.5] Audit – SHUTDOWN Privilege"
      block:
        - name: "5.5 – Tìm user có quyền SHUTDOWN"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'SHUTDOWN'"
          register: check_5_5

        - name: "5.5 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_5_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_5.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_5.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.5 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.5] SHUTDOWN Privilege (Manual - Level 1)
              Users : {{ check_5_5.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_5_status }}
              Fix   : REVOKE SHUTDOWN ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.6 – CREATE USER Privilege
    # ----------------------------------------------------------------
    - name: "[5.6] Audit – CREATE USER Privilege"
      block:
        - name: "5.6 – Tìm user có quyền CREATE USER"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'CREATE USER'"
          register: check_5_6

        - name: "5.6 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_6_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_6.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_6.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.6 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.6] CREATE USER Privilege (Manual - Level 1)
              Users : {{ check_5_6.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_6_status }}
              Fix   : REVOKE CREATE USER ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.7 – GRANT OPTION
    # ----------------------------------------------------------------
    - name: "[5.7] Audit – GRANT OPTION"
      block:
        - name: "5.7 – Tìm user có GRANT OPTION"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT DISTINCT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE IS_GRANTABLE = 'YES'"
          register: check_5_7

        - name: "5.7 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_7_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_7.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_7.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.7 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.7] GRANT OPTION (Manual - Level 1)
              Users : {{ check_5_7.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_7_status }}
              Fix   : REVOKE GRANT OPTION ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.8 – REPLICATION SLAVE Privilege
    # ----------------------------------------------------------------
    - name: "[5.8] Audit – REPLICATION SLAVE Privilege"
      block:
        - name: "5.8 – Tìm user có quyền REPLICATION SLAVE"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'REPLICATION SLAVE'"
          register: check_5_8

        - name: "5.8 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_8_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_8.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_8.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.8 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.8] REPLICATION SLAVE Privilege (Manual - Level 1)
              Users : {{ check_5_8.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_8_status }}
              Fix   : REVOKE REPLICATION SLAVE ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.9 – DML/DDL Grants per Database
    # ----------------------------------------------------------------
    - name: "[5.9] Audit – DML/DDL Grants per Database"
      block:
        - name: "5.9 – Lấy DML/DDL grants"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: >
              SELECT User, Host, Db FROM mysql.db
              WHERE Select_priv='Y' OR Insert_priv='Y' OR Update_priv='Y'
                 OR Delete_priv='Y' OR Create_priv='Y' OR Drop_priv='Y' OR Alter_priv='Y'
          register: check_5_9

        - name: "5.9 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_9_status: >-
              {{ 'MANUAL – Xem xét ' ~ (check_5_9.query_result[0] | length) ~ ' grant(s)'
                 if check_5_9.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.9 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.9] DML/DDL Grants per Database (Manual - Level 1)
              Grants: {{ check_5_9.query_result[0] | default([]) }}
              Result: {{ cis_5_9_status }}
              Fix   : REVOKE SELECT|INSERT|UPDATE|DELETE|CREATE|DROP|ALTER ON <db>.* FROM '<user>'@'<host>';
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.10 – Stored Procedures DEFINER/INVOKER
    # ----------------------------------------------------------------
    - name: "[5.10] Audit – Stored Procedures DEFINER"
      block:
        - name: "5.10 – Lấy danh sách stored procedures/functions"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT db, name, definer, security_type FROM mysql.proc"
          register: check_5_10
          ignore_errors: true

        - name: "5.10 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_10_status: >-
              {{ 'MANUAL – Xem xét ' ~ (check_5_10.query_result[0] | default([]) | length) ~ ' routine(s)'
                 if (check_5_10.query_result[0] | default([]) | length) > 0
                 else 'PASS' }}

        - name: "5.10 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.10] Stored Procedures DEFINER/INVOKER (Manual - Level 1)
              Routines: {{ check_5_10.query_result[0] | default([]) }}
              Result  : {{ cis_5_10_status }}
              Fix     : SHOW CREATE PROCEDURE <tên>; DROP và tạo lại với DEFINER phù hợp
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.11 – SET_ANY_DEFINER
    # ----------------------------------------------------------------
    - name: "[5.11] Audit – SET_ANY_DEFINER"
      block:
        - name: "5.11 – Tìm user có SET_ANY_DEFINER"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'SET_ANY_DEFINER'"
          register: check_5_11

        - name: "5.11 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_11_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_11.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_11.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.11 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.11] SET_ANY_DEFINER Privilege (Manual - Level 1)
              Users : {{ check_5_11.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('none') }}
              Result: {{ cis_5_11_status }}
              Fix   : REVOKE SET_ANY_DEFINER ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # 5.12 – ALLOW_NONEXISTENT_DEFINER
    # ----------------------------------------------------------------
    - name: "[5.12] Audit – ALLOW_NONEXISTENT_DEFINER"
      block:
        - name: "5.12 – Tìm user có ALLOW_NONEXISTENT_DEFINER"
          community.mysql.mysql_query:
            login_user: "{{ mysql_user }}"
            login_password: "{{ mysql_pass }}"
            query: "SELECT GRANTEE FROM INFORMATION_SCHEMA.USER_PRIVILEGES WHERE PRIVILEGE_TYPE = 'ALLOW_NONEXISTENT_DEFINER'"
          register: check_5_12

        - name: "5.12 – Set CIS status"
          ansible.builtin.set_fact:
            cis_5_12_status: >-
              {{ 'MANUAL – Xem xét: ' ~ (check_5_12.query_result[0] | map(attribute='GRANTEE') | list | join(', '))
                 if check_5_12.query_result[0] | length > 0
                 else 'PASS' }}

        - name: "5.12 – Ghi kết quả"
          ansible.builtin.set_fact:
            audit_lines: "{{ audit_lines + [ log_block ] }}"
          vars:
            log_block: |
              [5.12] ALLOW_NONEXISTENT_DEFINER Privilege (Manual - Level 1)
              Users : {{ check_5_12.query_result[0] | map(attribute='GRANTEE') | list | join(', ') | default('N/A – MySQL 8.0 không hỗ trợ') }}
              Result: {{ cis_5_12_status }}
              Fix   : REVOKE ALLOW_NONEXISTENT_DEFINER ON *.* FROM <user>;
              ----------------------------------------------------------------

    # ----------------------------------------------------------------
    # Write log
    # ----------------------------------------------------------------
    - name: Write audit log
      delegate_to: localhost
      become: false
      ansible.builtin.copy:
        dest: "{{ log_file }}"
        content: "{{ audit_lines | join('\n') }}"
